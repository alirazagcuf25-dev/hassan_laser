name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Ensure remote www directory exists
      run: |
        curl -v --ssl-reqd --insecure \
          --ftp-create-dirs \
          -u "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
          "ftp://${{ secrets.FTP_SERVER }}/public_html/www/.keep" \
          -T /dev/null || true

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps
        port: 21
        security: loose
        server-dir: ./public_html/www/
        state-name: .ftp-deploy-sync-state-www-v2.json
        timeout: 900000
        log-level: verbose
        exclude: |
          **/.git
          **/.git/**
          **/.git*
          **/.git*/**
          **/.github/**
          **/node_modules/**
          **/vendor/**
          **/run-logs/**