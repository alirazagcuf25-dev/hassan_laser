name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Remove file-directory name conflicts
      env:
        FTP_SERVER: ${{ secrets.FTP_SERVER }}
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        lftp -e "set ssl:verify-certificate no; set ftp:passive-mode true; set cmd:fail-exit false; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; cd /; rm api; rm app; rm config; rm public; bye"

    - name: Sync files to Hostinger FTP root
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        timeout: 120000
        # IMPORTANT: Many Hostinger FTP users are already jailed inside /public_html/www.
        # Use root (/) to avoid accidental nested folders like /public_html/www/public_html/www.
        server-dir: /
        dangerous-clean-slate: true
        exclude: |
          **/.git*
          **/.github/**
          **/run-logs/**

    - name: Verify live deploy marker
      run: |
        set -e
        curl -fsSL --max-time 20 "https://iceflowraza.com/www/deploy-test.txt?ts=$(date +%s)" | grep -q "DEPLOY_TEST_MARKER="