name: Deploy to Hostinger

on:
  push:
    branches:
      - main

concurrency:
  group: hostinger-deploy
  cancel-in-progress: true

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Sync files to Hostinger www directory
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        timeout: 120000
        # Hostinger path for this app
        server-dir: /www/
        dangerous-clean-slate: true
        exclude: |
          **/.git*
          **/.github/**
          **/run-logs/**

    - name: Verify live deploy marker
      run: |
        set -e
        curl -fsSL --max-time 20 "https://iceflowraza.com/www/deploy-test.txt?ts=$(date +%s)" | grep -q "DEPLOY_TEST_MARKER="