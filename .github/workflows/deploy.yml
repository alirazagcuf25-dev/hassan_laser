name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
    
    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        timeout: 60000 # Time badha diya taake timeout na ho
        # Hostinger FTP me aksar root already /public_html hota hai
        server-dir: /www/
        # Is se purani extra files delete nahi hongi, sirf nayi update hongi
        dangerous-clean-slate: false