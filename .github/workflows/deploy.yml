name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      FTP_SERVER: ${{ secrets.FTP_SERVER }}
      FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
      FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
    steps:
    - name: Get latest code
      uses: actions/checkout@v4

    - name: Install FTP diagnostic tool
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy and verify live marker
      run: |
        set -e
        TARGETS="/www/ /public_html/www/ ./www/"
        VERIFIED=0

        for TARGET in $TARGETS; do
          echo "Deploy attempt target: $TARGET"
          lftp -e "set ssl:verify-certificate no; set ftp:passive-mode true; open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER; mirror -R --delete --verbose --exclude-glob .git* --exclude-glob .github --exclude-glob run-logs* ./ $TARGET; bye" || true

          echo "Verifying live marker after target: $TARGET"
          if curl -fsSL "https://iceflowraza.com/www/deploy-test.txt?ts=$(date +%s)" | grep -q "DEPLOY_TEST_MARKER=2026-04-08-verify-01"; then
            echo "Live marker found. Correct target appears to be: $TARGET"
            VERIFIED=1
            break
          fi
        done

        if [ "$VERIFIED" -ne 1 ]; then
          echo "Live marker not found on https://iceflowraza.com/www/deploy-test.txt"
          echo "Please verify FTP secrets point to the same Hostinger account/domain."
          exit 1
        fi